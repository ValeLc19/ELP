name: sync-events

# Refresh the general-events catalog from visitelpaso.com. Runs in GitHub
# Actions (not the free Render dyno) so the multi-page scrape isn't bound by a
# request timeout. Writes straight to the Supabase Postgres DB.
#
# Requires a repo secret DATABASE_URL = the Supabase pooled connection string
# (Settings -> Secrets and variables -> Actions). Geocoding needs no key.
on:
  schedule:
    - cron: "0 11 * * *"   # daily at 11:00 UTC
  workflow_dispatch: {}      # allow manual runs

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Migrate + sync
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          alembic upgrade head
          python -m scripts.sync_visitelpaso
